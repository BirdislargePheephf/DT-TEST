  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

de-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ef3b7f1a-b13b-40d7-8356-c747892db061\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  @font-face {\n    font-family: 'The Black Box';\n    src: url(\"49c6bc2f-a6a3-42a8-a036-4f51a1886959\") format('opentype');\n    font-weight: normal;\n    font-style: normal;\n  }\n<\u002Fstyle>\n<style>\n  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n\n  :root {\n    --cyan:    #00c8f8;\n    --sky:     #7de8ff;\n    --white:   #e8f6ff;\n    --dark:    #020d1c;\n    --dark2:   #041626;\n    --dark3:   #071e36;\n    --gray:    #0d3558;\n    --text-muted: #6ab0d4;\n    --accent:  #00c8f8;\n    --glass-bg:     rgba(0, 120, 220, 0.10);\n    --glass-bg2:    rgba(0, 80, 180, 0.18);\n    --glass-border: rgba(120, 210, 255, 0.22);\n    --glass-shine:  rgba(255, 255, 255, 0.08);\n  }\n\n  html { scroll-behavior: smooth; }\n\n  body {\n    font-family: 'Syne', sans-serif;\n    background: var(--dark);\n    color: var(--white);\n    overflow-x: hidden;\n    /* deep sky gradient base */\n    background: radial-gradient(ellipse 120% 80% at 50% 0%, #04244a 0%, #020d1c 55%);\n  }\n\n  /* Custom cursor removed */\n\n  /* NAV — frosted glass Aero bar */\n  nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 20px 48px;\n    background: rgba(2, 20, 50, 0.55);\n    backdrop-filter: blur(20px) saturate(1.6);\n    -webkit-backdrop-filter: blur(20px) saturate(1.6);\n    border-bottom: 1px solid var(--glass-border);\n    box-shadow: 0 1px 0 var(--glass-shine), 0 8px 32px rgba(0,20,60,0.4);\n  }\n  .nav-logo {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 28px; letter-spacing: 4px;\n    color: var(--white);\n    text-decoration: none;\n    text-shadow: 0 0 20px rgba(0,200,248,0.5);\n  }\n  .nav-logo span { color: var(--cyan); }\n  .nav-links { display: flex; gap: 40px; list-style: none; }\n  .nav-links a {\n    font-family: 'Space Mono', monospace;\n    font-size: 11px; letter-spacing: 2px;\n    text-transform: uppercase; color: var(--text-muted);\n    text-decoration: none;\n    transition: color 0.2s, text-shadow 0.2s;\n  }\n  .nav-links a:hover { color: var(--white); text-shadow: 0 0 10px rgba(0,200,248,0.6); }\n\n  /* Glossy Aero button */\n  .nav-cta {\n    font-family: 'Space Mono', monospace;\n    font-size: 11px; letter-spacing: 2px;\n    text-transform: uppercase; font-weight: 700;\n    background: linear-gradient(180deg,\n      rgba(80,200,255,1) 0%,\n      rgba(0,140,230,0.95) 45%,\n      rgba(0,90,180,0.9) 100%);\n    color: #fff;\n    border: 1px solid rgba(160,230,255,0.7);\n    border-bottom: 2px solid rgba(0,40,100,0.5);\n    padding: 11px 26px;\n    border-radius: 6px;\n    cursor: pointer;\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.45),\n      inset 0 -1px 0 rgba(0,0,0,0.2),\n      0 4px 14px rgba(0,100,220,0.4),\n      0 0 20px rgba(0,180,255,0.15);\n    transition: all 0.2s ease;\n  }\n  .nav-cta:hover {\n    background: linear-gradient(180deg,\n      rgba(110,220,255,1) 0%,\n      rgba(20,160,250,0.95) 45%,\n      rgba(0,110,200,0.9) 100%);\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.55),\n      0 6px 18px rgba(0,120,240,0.5),\n      0 0 30px rgba(0,200,255,0.25);\n    transform: translateY(-1px);\n  }\n\n  /* HERO */\n  .hero {\n    position: relative; height: 100vh;\n    display: flex; align-items: center;\n    overflow: hidden;\n  }\n  .hero-bg {\n    position: absolute; inset: 0;\n    background:\n      radial-gradient(ellipse 90% 70% at 65% 40%, rgba(0,150,255,0.18) 0%, transparent 60%),\n      radial-gradient(ellipse 50% 90% at 15% 85%, rgba(0,80,200,0.10) 0%, transparent 55%),\n      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(100,230,255,0.08) 0%, transparent 50%);\n  }\n  /* Cloud/atmosphere glow layers */\n  .hero-bg::before {\n    content: '';\n    position: absolute; inset: 0;\n    background:\n      radial-gradient(ellipse 80% 30% at 50% 0%, rgba(0,180,255,0.07) 0%, transparent 60%),\n      radial-gradient(ellipse 40% 20% at 20% 15%, rgba(120,220,255,0.05) 0%, transparent 50%);\n  }\n  .hero-grid {\n    position: absolute; inset: 0;\n    background-image:\n      linear-gradient(rgba(0,180,255,0.05) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(0,180,255,0.05) 1px, transparent 1px);\n    background-size: 60px 60px;\n    mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);\n  }\n  .hero-content {\n    position: relative; z-index: 2;\n    padding: 0 48px; max-width: 700px;\n    animation: fadeUp 1s ease both;\n  }\n  .hero-eyebrow {\n    font-family: 'Space Mono', monospace;\n    font-size: 11px; letter-spacing: 4px;\n    color: var(--cyan); text-transform: uppercase;\n    margin-bottom: 20px;\n    display: flex; align-items: center; gap: 12px;\n  }\n  .hero-eyebrow::before {\n    content: ''; display: block;\n    width: 40px; height: 1px;\n    background: linear-gradient(to right, transparent, var(--cyan));\n  }\n  .hero-title {\n    font-family: 'The Black Box', 'Bebas Neue', sans-serif;\n    font-size: clamp(80px, 12vw, 140px);\n    line-height: 0.9; letter-spacing: 2px;\n    color: #e8f6ff;\n    margin-bottom: 28px;\n    text-shadow:\n      0 0 2px #fff,\n      0 0 8px rgba(0,200,248,1),\n      0 0 18px rgba(0,180,255,0.7),\n      0 0 35px rgba(0,140,220,0.4);\n    animation: neonFlicker 6s infinite;\n  }\n  .hero-title .line2 {\n    color: #e8f6ff;\n    -webkit-text-stroke: 0;\n    text-shadow:\n      0 0 2px #fff,\n      0 0 8px rgba(0,200,248,1),\n      0 0 18px rgba(0,180,255,0.7),\n      0 0 35px rgba(0,140,220,0.4);\n    animation: neonFlicker2 8s infinite;\n  }\n  @keyframes neonFlicker {\n    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {\n      text-shadow:\n        0 0 2px #fff,\n        0 0 8px rgba(0,200,248,1),\n        0 0 18px rgba(0,180,255,0.7),\n        0 0 35px rgba(0,140,220,0.4);\n    }\n    20%, 24%, 55% {\n      text-shadow: none;\n      color: rgba(232,246,255,0.6);\n    }\n  }\n  @keyframes neonFlicker2 {\n    0%, 30%, 32%, 60%, 62%, 100% {\n      text-shadow:\n        0 0 2px #fff,\n        0 0 8px rgba(0,200,248,1),\n        0 0 18px rgba(0,180,255,0.7),\n        0 0 35px rgba(0,140,220,0.4);\n    }\n    31%, 61% {\n      text-shadow: none;\n      color: rgba(232,246,255,0.5);\n    }\n  }\n  .hero-body {\n    font-size: 15px; line-height: 1.8;\n    color: var(--text-muted); max-width: 480px;\n    margin-bottom: 44px; font-weight: 400;\n  }\n  .hero-actions { display: flex; gap: 16px; align-items: center; }\n\n  /* Primary glossy Aero button */\n  .btn-primary {\n    font-family: 'Space Mono', monospace;\n    font-size: 12px; letter-spacing: 2px;\n    text-transform: uppercase; font-weight: 700;\n    background: linear-gradient(180deg,\n      rgba(80,210,255,1) 0%,\n      rgba(0,150,240,0.95) 45%,\n      rgba(0,90,190,0.9) 100%);\n    color: #fff;\n    border: 1px solid rgba(160,230,255,0.65);\n    border-bottom: 2px solid rgba(0,30,90,0.5);\n    padding: 16px 36px;\n    border-radius: 8px;\n    cursor: pointer;\n    text-decoration: none; display: inline-block;\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.4),\n      inset 0 -1px 0 rgba(0,0,0,0.15),\n      0 6px 20px rgba(0,120,240,0.45),\n      0 0 30px rgba(0,180,255,0.2);\n    transition: all 0.2s ease;\n    clip-path: none;\n  }\n  .btn-primary:hover {\n    background: linear-gradient(180deg,\n      rgba(110,225,255,1) 0%,\n      rgba(20,170,255,0.95) 45%,\n      rgba(0,110,210,0.9) 100%);\n    box-shadow:\n      inset 0 1px 0 rgba(255,255,255,0.5),\n      0 8px 26px rgba(0,140,255,0.55),\n      0 0 40px rgba(0,200,255,0.3);\n    transform: translateY(-2px);\n  }\n\n  /* Ghost / glass button */\n  .btn-ghost {\n    font-family: 'Space Mono', monospace;\n    font-size: 12px; letter-spacing: 2px;\n    text-transform: uppercase; font-weight: 400;\n    background: rgba(0, 100, 200, 0.12);\n    color: var(--white);\n    border: 1px solid var(--glass-border);\n    padding: 16px 36px;\n    border-radius: 8px;\n    cursor: pointer;\n    text-decoration: none; display: inline-block;\n    backdrop-filter: blur(8px);\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);\n    transition: all 0.2s ease;\n  }\n  .btn-ghost:hover {\n    background: rgba(0, 130, 220, 0.22);\n    border-color: rgba(160,230,255,0.5);\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 16px rgba(0,100,220,0.3);\n  }\n\n  /* Hero visual */\n  .hero-visual {\n    position: absolute; right: 0; top: 0; bottom: 0;\n    width: 55%; display: flex; align-items: flex-end;\n    justify-content: center; z-index: 1;\n    overflow: hidden;\n  }\n  .hero-char-glow {\n    position: absolute; bottom: 0; right: 15%;\n    width: 500px; height: 700px;\n    background: radial-gradient(ellipse at bottom, rgba(0,180,255,0.22) 0%, transparent 65%);\n    pointer-events: none;\n  }\n  .hero-char {\n    position: relative; width: 480px; height: 680px;\n    display: flex; align-items: flex-end; justify-content: center;\n  }\n  .char-silhouette { width: 340px; height: 600px; opacity: 0.9; }\n\n  .hero-stat-bar {\n    position: absolute; bottom: 48px; right: 48px;\n    display: flex; gap: 40px;\n    font-family: 'Space Mono', monospace; z-index: 10;\n  }\n  .stat-item { text-align: right; }\n  .stat-num { font-size: 32px; font-weight: 700; color: var(--white); display: block; line-height: 1; }\n  .stat-label { font-size: 10px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }\n\n  /* MARQUEE — Aero glass strip */\n  .marquee-wrap {\n    background: linear-gradient(90deg,\n      rgba(0,100,200,0.85) 0%,\n      rgba(0,160,240,0.9) 50%,\n      rgba(0,100,200,0.85) 100%);\n    border-top: 1px solid rgba(160,230,255,0.3);\n    border-bottom: 1px solid rgba(160,230,255,0.3);\n    padding: 11px 0;\n    overflow: hidden; white-space: nowrap;\n    box-shadow: 0 0 30px rgba(0,140,255,0.3), inset 0 1px 0 rgba(255,255,255,0.15);\n  }\n  .marquee-track {\n    display: inline-flex; gap: 0;\n    animation: marquee 20s linear infinite;\n  }\n  .marquee-item {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 18px; letter-spacing: 4px;\n    color: #e8f6ff; padding: 0 40px;\n    text-shadow: 0 1px 0 rgba(0,0,0,0.2);\n  }\n  .marquee-dot { color: rgba(200,240,255,0.4); font-size: 8px; vertical-align: middle; }\n\n  /* SECTION commons */\n  section { padding: 120px 48px; }\n  .section-label {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px; letter-spacing: 4px;\n    color: var(--cyan); text-transform: uppercase;\n    margin-bottom: 16px;\n    display: flex; align-items: center; gap: 12px;\n  }\n  .section-label::before {\n    content: ''; width: 30px; height: 1px;\n    background: linear-gradient(to right, transparent, var(--cyan));\n  }\n  .section-title {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: clamp(48px, 6vw, 80px);\n    letter-spacing: 2px; line-height: 0.95;\n    margin-bottom: 20px;\n  }\n\n  /* CHARACTERS — glass cards */\n  .characters-section {\n    background: linear-gradient(180deg, #041626 0%, #020d1c 100%);\n  }\n  .characters-header {\n    display: flex; justify-content: space-between;\n    align-items: flex-end; margin-bottom: 60px;\n  }\n  .characters-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 3px;\n    max-width: 900px;\n  }\n  .char-card {\n    position: relative; aspect-ratio: 3/4;\n    overflow: hidden; cursor: pointer;\n    background: var(--dark3);\n    border: 1px solid var(--glass-border);\n    border-radius: 4px;\n    transition: transform 0.3s, box-shadow 0.3s;\n  }\n  .char-card:hover {\n    box-shadow: 0 0 30px rgba(0,180,255,0.2), 0 0 0 1px rgba(0,200,255,0.3);\n    transform: translateY(-4px);\n  }\n  .char-card:first-child { grid-row: span 1; aspect-ratio: 3/4; }\n  .char-bg {\n    position: absolute; inset: 0;\n    transition: transform 0.6s ease;\n  }\n  .char-card:hover .char-bg { transform: scale(1.05); }\n  .char-overlay {\n    position: absolute; inset: 0;\n    background: linear-gradient(to top,\n      rgba(2, 14, 36, 0.92) 0%,\n      rgba(2, 14, 36, 0.4) 40%,\n      transparent 65%);\n    transition: opacity 0.3s;\n  }\n  /* Frosted glass info panel */\n  .char-info {\n    position: absolute; bottom: 0; left: 0; right: 0;\n    padding: 20px 24px 22px;\n    background: linear-gradient(to top,\n      rgba(2, 14, 40, 0.85) 0%,\n      rgba(4, 22, 55, 0.6) 60%,\n      transparent 100%);\n    backdrop-filter: blur(4px);\n    border-top: 1px solid rgba(0, 180, 255, 0.1);\n  }\n  .char-role {\n    font-family: 'Space Mono', monospace;\n    font-size: 9px; letter-spacing: 3px;\n    color: var(--cyan); text-transform: uppercase;\n    margin-bottom: 6px;\n    text-shadow: 0 0 10px rgba(0,200,248,0.4);\n  }\n  .char-name {\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 28px; letter-spacing: 2px; color: var(--white);\n    line-height: 1;\n    text-shadow: 0 0 20px rgba(0,180,255,0.3);\n  }\n  .char-tag { font-size: 12px; color: var(--text-muted); margin-top: 6px; }\n  .char-corner {\n    position: absolute; top: 16px; right: 16px;\n    width: 28px; height: 28px;\n    border-top: 1px solid rgba(0,200,255,0.5);\n    border-right: 1px solid rgba(0,200,255,0.5);\n  }\n\n  /* Character background gradients — Aero-tinted */\n  .char-bg-1 {\n    background:\n      radial-gradient(circle at 50% 25%, rgba(0,180,255,0.30) 0%, transparent 50%),\n      radial-gradient(circle at 80% 70%, rgba(0,100,200,0.15) 0%, transparent 40%),\n      linear-gradient(160deg, #061830, #020d1c);\n  }\n  .char-bg-1::after {\n    content: ''; position: absolute; inset: 0;\n    background-image: repeating-linear-gradient(\n      45deg, transparent, transparent 10px,\n      rgba(0,180,255,0.025) 10px, rgba(0,180,255,0.025) 11px\n    );\n  }\n  .char-bg-2 {\n    background:\n      radial-gradient(circle at 50% 40%, rgba(0,200,255,0.22) 0%, transparent 50%),\n      linear-gradient(135deg, #082035, #020d1c);\n  }\n  .char-bg-3 {\n    background:\n      radial-gradient(circle at 50% 40%, rgba(80,160,255,0.2) 0%, transparent 50%),\n      linear-gradient(135deg, #061535, #02091a);\n  }\n  .char-bg-4 {\n    background:\n      radial-gradient(circle at 50% 40%, rgba(0,220,200,0.2) 0%, transparent 50%),\n      linear-gradient(135deg, #051a28, #020d1c);\n  }\n  .char-bg-5 {\n    background:\n      radial-gradient(circle at 50% 40%, rgba(100,200,255,0.22) 0%, transparent 50%),\n      linear-gradient(135deg, #071a35, #02101e);\n  }\n\n  /* Character SVG figures */\n  .char-figure {\n    position: absolute; bottom: 80px; left: 50%;\n    transform: translateX(-50%);\n    width: 120px; height: 200px;\n    transition: transform 0.5s ease;\n    filter: drop-shadow(0 0 12px rgba(0,160,255,0.2));\n  }\n  .char-card:first-child .char-figure { width: 120px; height: 200px; bottom: 80px; }\n  .char-card:hover .char-figure {\n    transform: translateX(-50%) translateY(-8px);\n    filter: drop-shadow(0 0 20px rgba(0,180,255,0.35));\n  }\n\n  /* STORY / ABOUT SECTION */\n  .story-section {\n    background: linear-gradient(180deg, #020d1c 0%, #041626 100%);\n    overflow: hidden;\n  }\n  .story-inner {\n    display: grid; grid-template-columns: 1fr 1fr;\n    gap: 80px; align-items: center;\n    max-width: 1400px; margin: 0 auto;\n  }\n  .story-visual {\n    position: relative; aspect-ratio: 4/5;\n    background: var(--dark3);\n    clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 30px, 100% 100%, 30px 100%, 0 calc(100% - 30px));\n    overflow: hidden;\n    border: 1px solid var(--glass-border);\n    box-shadow: 0 0 40px rgba(0,120,220,0.15);\n  }\n  .story-visual-inner {\n    position: absolute; inset: 0;\n    background:\n      radial-gradient(ellipse at 40% 30%, rgba(0,160,255,0.22) 0%, transparent 55%),\n      radial-gradient(ellipse at 80% 80%, rgba(0,80,200,0.12) 0%, transparent 45%),\n      linear-gradient(135deg, #071e3c, #020d1c);\n  }\n  .story-glyph {\n    position: absolute; top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 220px; letter-spacing: -10px;\n    color: rgba(0,180,255,0.07);\n    white-space: nowrap; user-select: none;\n  }\n  .story-badge {\n    position: absolute; bottom: 32px; left: 32px;\n    background: linear-gradient(180deg,\n      rgba(60,180,255,0.95) 0%,\n      rgba(0,120,220,0.92) 100%);\n    padding: 14px 22px;\n    border: 1px solid rgba(160,230,255,0.4);\n    border-radius: 4px;\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), 0 4px 16px rgba(0,100,220,0.4);\n    clip-path: none;\n  }\n  .story-badge-label {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px; letter-spacing: 2px;\n    color: #fff; text-transform: uppercase; font-weight: 700;\n    text-shadow: 0 1px 2px rgba(0,0,0,0.3);\n  }\n  .story-body {\n    color: var(--text-muted); font-size: 15px;\n    line-height: 1.85; margin-bottom: 32px;\n  }\n  .story-quote {\n    border-left: 2px solid var(--cyan);\n    padding-left: 24px; margin: 32px 0;\n    font-family: 'Bebas Neue', sans-serif;\n    font-size: 22px; letter-spacing: 1px;\n    color: var(--white); line-height: 1.4;\n    text-shadow: 0 0 20px rgba(0,180,255,0.2);\n  }\n  .story-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 32px; }\n  .tag {\n    font-family: 'Space Mono', monospace;\n    font-size: 10px; letter-spacing: 2px;\n    text-transform: uppercase; color: var(--text-muted);\n    border: 1px solid var(--glass-border);\n    border-radius: 20px;\n    padding: 7px 16px;\n    background: rgba(0, 80, 180, 0.10);\n    transition: all 0.2s;\n    cursor: pointer;\n  }\n  .tag:hover {\n    border-color: var(--cyan);\n    color: var(--cyan);\n    background: rgba(0, 180, 255, 0.12);\n    box-shadow: 0 0 12px rgba(0,180,255,0.2);\n  }\n\n  /* NEWS / BONUSES */\n  .news-section {\n    background: linear-gradient(180deg, #041626 0%, #020d1c 100%);\n  }\n  .news-grid {\n    display: grid;\n    grid-template-columns: 2fr 1fr 1fr;\n    gap: 3px; margin-top: 60px;\n  }\n  .news-card {\n    position: relative;\n    background: rgba(4, 22, 55, 0.65);\n    border: 1px solid var(--glass-border);\n    border-radius: 4px;\n    overflow: hidden; cursor: pointer;\n    transition: transform 0.3s, box-shadow 0.3s;\n    backdrop-filter: blur(6px);\n  }\n  .news-card:hover {\n    transform: translateY(-4px);\n    box-shadow: 0 8px 30px rgba(0,120,220,0.25), 0 0 0 1px rgba(0,200,255,0.2);\n  }\n  .news-card.featured { grid-row: span 2; }\n  .news-thumb { aspect-ratio: 16/9; position: relative; overflow: hidden; }\n  .news-card.featured .news-thumb { aspect-ratio: unset; height: 260px; }\n  .news-thumb-inner {\n    position: absolute; inset: 0;\n    transition: transform 0.5s ease;\n  }\n  .news-card:hover .news-thumb-inner { transform: scale(1.04); }\n  .news-bg-1 {\n    background: radial-gradient(circle at 30% 50%, rgba(0,160,255,0.35) 0%, transparent 60%),\n    linear-gradient(135deg, #061a38, #020d1c);\n  }\n  .news-bg-2 {\n    background: radial-gradient(circle at 70% 30%, rgba(0,200,255,0.22) 0%, transparent 60%),\n    linear-gradient(135deg, #051530, #020d1c);\n  }\n  .news-bg-3 {\n    background: radial-gradient(circle at 50% 50%, rgba(60,140,255,0.2) 0%, transparent 60%),\n    linear-gradient(135deg, #060e28, #020d1c);\n  }\n  .news-bg-4 {\n    background: radial-gradient(circle at 50% 50%, rgba(0,180,220,0.2) 0%, transparent 60%),\n    linear-gradient(135deg, #051520, #020d1c);\n  }\n  .news-bg-5 {\n    background: radial-gradient(circle at 50% 50%, rgba(80,200,255,0.2) 0%, transparent 60%),\n    linear-gradient(135deg, #061a38, #020d1c);\n  }\n  .news-body { padding: 20px 24px; }\n  .news-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }\n  .news-cat {\n    font-family: 'Space Mono', monospace;\n    font-size: 9px; letter-spacing: 2px;\n    text-transform: uppercase; color: #fff;\n    background: linear-gradient(180deg,\n      rgba(60,180,255,0.95) 0%,\n      rgba(0,120,220,0.9) 100%);\n    border: 1px solid rgba(160,230,255,0.3);\n    border-radius: 3px;\n    padding: 3px 10px;\n    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);\n  }\n  .news-date { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); }\n  .news-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--white); line-height: 1.4; }\n  .news-card.featured .news-title { font-size: 20px; }\n\n  /* VIDEO SECTION */\n  .video-section {\n    position: relative; min-height: 600px;\n    display: flex; align-items: center;\n    justify-content: center; overflow: hidden;\n    flex-direction: column; gap: 32px;\n    padding: 80px 48px;\n    background: var(--dark);\n  }\n  .video-bg {\n    position: absolute; inset: 0;\n    background:\n      radial-gradient(ellipse 70% 70% at 50% 50%, rgba(0,160,255,0.14) 0%, transparent 60%),\n      repeating-linear-gradient(\n        0deg, transparent, transparent 80px,\n        rgba(0,160,255,0.018) 80px, rgba(0,160,255,0.018) 81px\n      ),\n      var(--dark);\n  }\n  /* Glassy play button */\n  .play-btn {\n    position: relative; z-index: 2;\n    width: 100px; height: 100px;\n    background: rgba(0, 100, 200, 0.2);\n    border: 1px solid rgba(0, 200, 255, 0.5);\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    cursor: pointer;\n    backdrop-filter: blur(10px);\n    box-shadow:\n ace Mono', monospace;\n    font-size: 10px; letter-spacing: 3px;\n    text-transform: uppercase; color: var(--cyan);\n    margin-bottom: 20px;\n    text-shadow: 0 0 10px rgba(0,200,248,0.3);\n  }\n  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }\n  .footer-col a {\n    font-size: 13px; color: var(--text-muted);\n    text-decoration: none; transition: color 0.2s, text-shadow 0.2s;\n  }\n  .footer-col a:hover { color: var(--white); text-shadow: 0 0 8px rgba(0,200,248,0.4); }\n  .footer-bottom {\n    display: flex; justify-content: space-between;\n    align-items: center; padding-top: 40px;\n    border-top: 1px solid var(--glass-border);\n    font-family: 'Space Mono', monospace;\n    font-size: 10px; color: var(--text-muted);\n    letter-spacing: 1px;\n  }\n  .footer-social { display: flex; gap: 12px; }\n  .social-btn {\n    width: 36px; height: 36px;\n    border: 1px solid var(--glass-border);\n    border-radius: 6px;\n    display: flex; align-items: center; justify-content: center;\n    cursor: pointer;\n    font-family: 'Space Mono', monospace;\n    font-size: 10px; color: var(--text-muted);\n    text-decoration: none;\n    background: rgba(0, 80, 180, 0.12);\n    backdrop-filter: blur(6px);\n    transition: all 0.2s;\n  }\n  .social-btn:hover {\n    border-color: var(--cyan);\n    color: var(--cyan);\n    background: rgba(0, 160, 255, 0.18);\n    box-shadow: 0 0 12px rgba(0,180,255,0.25);\n  }\n\n  /* SCROLL INDICATOR */\n  .scroll-hint {\n    position: absolute; bottom: 48px; left: 48px;\n    z-index: 10; display: flex; align-items: center; gap: 16px;\n    font-family: 'Space Mono', monospace;\n    font-size: 10px; letter-spacing: 2px;\n    color: var(--text-muted); text-transform: uppercase;\n  }\n  .scroll-line {\n    width: 1px; height: 60px;\n    background: linear-gradient(to bottom, transparent, var(--cyan));\n    animation: scrollLine 2s ease infinite;\n  }\n\n  /* ANIMATIONS */\n  @keyframes fadeUp {\n    from { opa -name\">MORI ANNE FORREST<\u002Fdiv>\n        <div class=\"char-tag\">Female · Age 29 · Born Aug 3, 1998 · Japanese / American<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Card 2 — Jeimii Tomoyuki Maresuke -->\n    <div class=\"char-card\">\n      <div class=\"char-bg char-bg-2\"><\u002Fdiv>\n      <div class=\"char-overlay\"><\u002Fdiv>\n      <div class=\"char-corner\"><\u002Fdiv>\n      <div class=\"char-info\">\n        <div class=\"char-role\">Interpol · CIA (Covert Ops) · FBI (Advisor) · U.NSCP<\u002Fdiv>\n        <div class=\"char-name\">JEIMII TOMOYUKI MARESUKE<\u002Fdiv>\n        <div class=\"char-tag\">Male · Age 28 · Born Aug 9, 1999 · Japanese<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Card 3 — Francis \"Keith\" Corcoran -->\n    <div class=\"char-card\">\n      <div class=\"char-bg char-bg-5\"><\u002Fdiv>\n      <div class=\"char-overlay\"><\u002Fdiv>\n      <div class=\"char-corner\"><\u002Fdiv>\n      <div class=\"char-info\">\n        <div class=\"char-role\">Interpol · CIA · FBI (Advisor) · U.NSCP<\u002Fdiv>\n        <div class=\"char-name\">FRANCIS \"KEITH\" CORCORAN<\u002Fdiv>\n        <div class=\"char-tag\">Male · Age 38 · Born Jul 6, 1989 · Canadian / Irish<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<section class=\"story-section\" id=\"about\">\n  <div class=\"story-inner\">\n    <div class=\"story-visual reveal\">\n      <div class=\"story-visual-inner\">\n        <div class=\"story-glyph\">DT<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- City / World illustration SVG -->\n      <img src=\"5b9a13fc-5740-4baf-bb65-57baec694999\" alt=\"World Trade Center\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.85;\">\n      <div class=\"story-badge\">\n        <div class=\"story-badge-label\">World Trade Center 2, New York<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"story-text reveal\">\n      <div class=\"section-label\">Introduction<\u002Fdiv>\n      <h2 class=\"section-title\">THE YEAR IS 2027<\u002Fh2>\n      <p class=\"story-body\">\n        The United States Emergency Government has successfully unified America claiming itself to be the new successor of the former government, the Emergency Government announced to the world in the U.N Headquarters in early 2027 to start their new \"Campaign for Global Peace\" due to the disbanding of NATO after the United States collapsed in late 2021.\n      <\u002Fp>\n      <div class=\"story-quote\">\n        \"We did not choose to be the guardians of the gate, but there is no one else\" — Lyndon B. Johnson\n      <\u002Fdiv>\n      <p class=\"story-body\">\n        NATO's successor \"the U.N Strategic Coalition for Peace\" is established with the U.S as its leader, with more than 100+ members it started one of the largest global security and counterterrorism efforts since the War on Terror.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VIDEO -->\n<section class=\"video-section\" id=\"media\">\n  <div class=\"video-bg\"><\u002Fdiv>\n  <span class=\"video-label\">Official Trailer — Double Trouble<\u002Fspan>\n  <a href=\"https://www.youtube.com/watch?v=etvxqU4QTu0\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"position:relative;z-index:2;display:block;width:min(860px,88vw);aspect-ratio:16/9;border:1px solid var(--glass-border);border-radius:8px;overflow:hidden;box-shadow:0 0 60px rgba(0,140,255,0.25),0 0 0 1px rgba(0,200,255,0.1);text-decoration:none;\">\n    <img src=\"9ded78d5-3e4a-4853-8fd4-5252834536c9\" alt=\"Double Trouble Official Trailer\" style=\"width:100%;height:100%;object-fit:cover;display:block;\">\n    <!-- Play button overlay -->\n    <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,13,28,0.35);transition:background 0.3s;\" onmouseover=\"this.style.background='rgba(2,13,28,0.15)'\" onmouseout=\"this.style.background='rgba(2,13 lease on December 21, 2027 on PC (Steam), PlayStation 5, and Xbox Series X|S.<\u002Fdiv>\n        <div class=\"news-title\" style=\"margin-bottom:16px;\">Is the game playable solo?<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:14px;\">Yes, Double Trouble is primarily a single-player experience, but will include multiplayer features.<\u002Fdiv>\n        <div class=\"news-title\" style=\"margin-bottom:16px;\">What's included in the expansion pass?<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--text-muted);line-height:1.6;\">Three major DLC expansions planned for 2028, each adding new story content and gameplay.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"news-card\">\n      <div class=\"news-thumb\">\n        <div class=\"news-thumb-inner news-bg-3\">\n          <svg style=\"position:absolute;inset:0;width:100%;height:100%;opacity:0.7\" viewBox=\"0 0 400 200\" xmlns=\"http://www.w3.org/2000/svg\">\n            <text x=\"200\" y=\"130\" font-family=\"Bebas Neue, sans-serif\" font-size=\"80\" text-anchor=\"middle\" fill=\"rgba(200,60,255,0.2)\" letter-spacing=\"2\">MAP<\u002Ftext>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"news-body\">\n        <div class=\"news-meta\">\n          <span class=\"news-cat\">Bonus<\u002Fspan>\n          <span class=\"news-date\">Pre-order<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"news-title\">Exclusive Map — \"World Map 2027\" available only for pre-orders<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"news-card\">\n      <div class=\"news-thumb\">\n        <div class=\"news-thumb-inner news-bg-4\">\n          <svg style=\"position:absolute;inset:0;width:100%;height:100%;opacity:0.7\" viewBox=\"0 0 400 200\" xmlns=\"http://www.w3.org/2000/svg\">\n            <text x=\"200\" y=\"130\" font-family=\"Bebas Neue, sans-serif\" font-size=\"60\" text-anchor=\"middle\" fill=\"rgba(60,220,1
